<!doctype html>
<html lang="en">

  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Items</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
      header { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      button { padding: 8px 12px; cursor: pointer; }
      .muted { color: #666; }
      .error { color: #b00020; white-space: pre-wrap; }
      ul { padding-left: 18px; }
      li { margin: 8px 0; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 10px 0; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; }
      .pill { font-size: 12px; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; }
      pre { background: #f6f8fa; padding: 10px; border-radius: 10px; overflow: auto; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1 style="margin: 0;">Items</h1>
        <div id="status" class="muted">Idle</div>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </header>

    <!-- Create Machine Modal Button -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createMachineModal">
      Create Machine
    </button>

    <!-- Create Machine modal -->
    <button type="button" class="btn btn-primary" id="showMachineBtn">
      Show Machines
    </button>

    <div id="error" class="error" role="alert" aria-live="polite"></div>
    <div id="items"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>

  <!-- Create Machine Modal -->
  <div class="modal fade" id="createMachineModal" tabindex="-1" aria-labelledby="createMachineModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="createMachineModalLabel">Create Washer/Dryer</h1>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <form id="machineForm">
              <label for="machineType" class="form-label">Machine Type</label>
              <select class="form-select mb-3" aria-label=".form-select" id="machineType">
                <option selected>Select Machine Type</option>
                <option value="washer">Washer</option>
                <option value="dryer">Dryer</option>
              </select>
              <label for="machineBuilding" class="form-label">Building</label>
              <select class="form-select mb-3" aria-label=".form-select" id="machineBuilding">
                <option selected>Select Machine Building</option>
                <option value="chase">Chase Court</option>
                <option value="tower">Crowell Tower</option>
              </select>
              <label for="machineFloor" class="form-label">Floor</label>
              <select class="form-select mb-3" id="machineFloor" disabled>
                <option value="" selected>Select Floor</option>
              </select>
              <div id="sectionContainer" class="mb-3 d-none">
                <label for="machineSection" class="form-label">Section</label>
                <select class="form-select mb-3" id="machineSection">
                  <option value="" selected>Select Section</option>
                </select>
              </div>
            </form>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="saveMachineBtn">Save changes</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Success Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="successToastBody">
        Machine created successfully!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

</html>

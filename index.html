<!doctype html>
<html lang="en">

  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.ts"></script>
    <title>Items</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 0; }
      header { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      button { padding: 8px 12px; cursor: pointer; }
      .muted { color: #666; }
      .error { color: #b00020; white-space: pre-wrap; }
      ul { padding-left: 18px; }
      li { margin: 8px 0; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 10px 0; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; }
      .pill { font-size: 12px; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; }
      pre { background: #f6f8fa; padding: 10px; border-radius: 10px; overflow: auto; }
      body.user .admin { display: none !important; }
    </style>
  </head>
  <body class="user">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">Laundry Tracker</span>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <!-- Location dropdown -->
        <ul class="navbar-nav me-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
              Locations
            </a>
            <ul class="dropdown-menu">
              <li><button class="dropdown-item" id="filterChase">Chase Court</button></li>
              <li><button class="dropdown-item" id="filterTower">Crowell Tower</button></li>
            </ul>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="filterComments">Comments</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="filterActivity">Activity</button>
          </li>
          <li class="nav-item admin">
            <button class="nav-link" id="filterPower">Power</button>
          </li>
        </ul>

        <!-- Right side: Create + Mode toggle -->
        <div class="d-flex align-items-center gap-2">
          <button type="button" class="btn btn-primary btn-sm admin" data-bs-toggle="modal" data-bs-target="#createMachineModal">
            Create Machine
          </button>
          <button type="button" id="modeToggleBtn" class="btn btn-outline-light btn-sm">
            Admin
          </button>
        </div>
      </div>
    </nav>

    <!-- Comments Panel -->
    <div id="commentsPanel" style="display:none; margin:16px;">
      <h5>Comments</h5>
      <div id="commentsList"></div>
    </div>

    <!-- Activity Panel -->
    <div id="activityPanel" style="display:none; margin:16px;">
      <h5>Activity</h5>
      <div id="activityLogList"></div>
    </div>

    <!-- Main Content (hidden when Activity tab is open) -->
    <div id="mainContent">
      <!-- Floor Filter Buttons (populated dynamically) -->
      <div class="mx-3 mt-3 mb-2 d-flex gap-2 flex-wrap d-none" id="floorFilterRow"></div>

      <!-- Map + Table -->
      <div style="display:flex; gap:16px; align-items:flex-start; margin:16px;">
        <!-- Floor Map -->
        <div id="floorMap" style="display:none; position:relative; flex:1 1 0; min-width:0;">
          <img id="floorMapImg" src="" style="width:100%; display:block;" />
        </div>

        <!-- Machine List -->
        <div id="list" style="flex:0 0 320px; min-width:220px; max-width:380px;"></div>
      </div>
    </div>
  </body>

  <!-- Create Machine Modal -->
  <div class="modal fade" id="createMachineModal" tabindex="-1" aria-labelledby="createMachineModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="createMachineModalLabel">Create Washer/Dryer</h1>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <form id="machineForm">
              <label for="machineType" class="form-label">Machine Type</label>
              <select class="form-select mb-3" aria-label=".form-select" id="machineType">
                <option selected>Select Machine Type</option>
                <option value="washer">Washer</option>
                <option value="dryer">Dryer</option>
              </select>
              <label for="machineBuilding" class="form-label">Building</label>
              <select class="form-select mb-3" aria-label=".form-select" id="machineBuilding">
                <option selected>Select Machine Building</option>
                <option value="chase">Chase Court</option>
                <option value="tower">Crowell Tower</option>
              </select>
              <label for="machineFloor" class="form-label">Floor</label>
              <select class="form-select mb-3" id="machineFloor" disabled>
                <option value="" selected>Select Floor</option>
              </select>
              <div id="sectionContainer" class="mb-3 d-none">
                <label for="machineSection" class="form-label">Section</label>
                <select class="form-select mb-3" id="machineSection">
                  <option value="" selected>Select Section</option>
                </select>
              </div>
            </form>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="saveMachineBtn">Save changes</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Calibrate Machine Modal -->
  <div class="modal fade" id="calibrateMachineModal" tabindex="-1" aria-labelledby="calibrateMachineModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="calibrateMachineModalLabel">Calibrate Machine</h1>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-2">Set minimum wattages for each state. e.g. off = 5W, idle = 10W, running = 30W.</p>
          <label for="offWattageInput" class="form-label">Off (W)</label>
          <input type="number" class="form-control mb-2" id="offWattageInput" min="0" placeholder="e.g. 5" />
          <label for="idleWattageInput" class="form-label">Idle (W)</label>
          <input type="number" class="form-control mb-2" id="idleWattageInput" min="0" placeholder="e.g. 10" />
          <label for="runningWattageInput" class="form-label">Running (W)</label>
          <input type="number" class="form-control" id="runningWattageInput" min="0" placeholder="e.g. 200" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="saveCalibrateBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Comment Modal -->
  <div class="modal fade" id="commentModal" tabindex="-1" aria-labelledby="commentModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="commentModalLabel">Machine Notes</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="commentNotesList" class="mb-3" style="max-height:250px; overflow-y:auto;"></div>
          <hr>
          <label for="commentNoteInput" class="form-label">Add a note</label>
          <textarea class="form-control" id="commentNoteInput" rows="3" placeholder="Enter your note..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="saveCommentBtn">Save Note</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Queue Notification Toasts -->
  <div class="toast-container position-fixed bottom-0 start-0 p-3" id="queueToastContainer"></div>

  <!-- Success Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="successToastBody">
          Machine created successfully!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>
</html>
